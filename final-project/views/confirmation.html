<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Roboto:wght@100;300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../static/style.css">
<script src="https://code.jquery.com/jquery-4.0.0.min.js" integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
<script src="../static/script.js" defer></script>
<meta name="author" content="Derek Li">
<meta name="keywords" content="Museum, Carnegie Mellon University, Information Systems">
<meta name="description" content="MonoMuse website redesign project">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MonoMuse - Order Confirmation</title>
</head>

<body onload="addYear()">
<div class="container">
    <header class="header">
        <img id="logo" src="../static/monomuselogo.png" alt="MonoMuse Museum Logo">
    </header>
    <nav class="nav_bar">
        <a href="../index.html">Home</a>
        <a href="explore.html">Explore</a>
        <a href="exhibitions.html">Exhibitions</a>
        <a href="tickets.html">Buy Tickets</a>
        <a href="donate.html">Donate</a>
        <button id="hamburger" onclick="toggleNav()">☰</button>
    </nav>

    <main class="main">
        <h1>Order Confirmed!</h1>
        <p>Thank you for your purchase. Your tickets have been reserved.</p>

        <div id="orderSummary">
            <h2>Order Summary</h2>
            <p><strong>Date:</strong> <span id="confirmDate"></span></p>
            <p><strong>Ticket Type:</strong> <span id="confirmType"></span></p>
            <p><strong>Quantity:</strong> <span id="confirmQty"></span></p>
            <p><strong>Total:</strong> <span id="confirmTotal"></span></p>
        </div>

        <a class="cta" href="../index.html">Return to Home</a>
    </main>

    <footer class="footer">
        <p id="copyYear"></p>
    </footer>
</div>
</body>
</html>
