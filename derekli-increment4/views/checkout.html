<body onload="addYear()">
<div class="container"> 
    <header class="header">
        <img id="logo" src="../static/monomuselogo.png" alt="MonoMuse Museum Logo">

    <nav class="nav_bar"> 
        <a href="../index.html">Home</a>

    <main class="main">
        <form>
            <label for="name">Name (required):</label><br>
            <input type="text" id="name" name="name" required><br>

            <label for="quantity">Ticket Quantity (required):</label><br>
